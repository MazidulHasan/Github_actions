name: API Test Suite

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      environment:
        description: Test environment
        required: false
        default: dev
        type: choice
        options: [dev, staging, prod]
      suite:
        description: Test suite
        required: false
        default: all
        type: choice
        options: [all, auth, users]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          SUITE="${{ github.event.inputs.suite || 'all' }}"
          if [ "$SUITE" = "auth" ]; then
            npx playwright test tests/auth
          elif [ "$SUITE" = "users" ]; then
            npx playwright test tests/users
          else
            npx playwright test
          fi
        shell: bash
        env:
          CI: true
          TEST_ENV: ${{ github.event.inputs.environment || 'dev' }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/results.json
          retention-days: 30
